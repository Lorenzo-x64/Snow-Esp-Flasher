name: Deploy web flasher

# Generates releases.json + per-variant manifests by querying the GitHub API
# for the Snow-Depth-Sensor repo. Pure Python — no fragile bash, no auth needed
# since the source repo is public.
#
# Triggers:
#   • push to main           (after edits to the flasher repo)
#   • schedule (every 6 h)   (auto-catches new releases without manual action)
#   • workflow_dispatch      (manual button in the Actions tab)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SOURCE_REPO: Lorenzo-x64/Snow-Depth-Sensor

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate releases.json and manifests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PYEOF'
          import json, os, sys, urllib.request, urllib.error
          from datetime import datetime, timezone

          SOURCE_REPO  = os.environ['SOURCE_REPO']
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN', '')
          BASE_URL    = f"https://github.com/{SOURCE_REPO}/releases/download"

          VARIANTS = {
              'tx': {
                  'tag':         'Snow_TX_BIN',
                  'label':       'Transmitter — Full',
                  'description': 'Full transmitter node with onboard dashboard. '
                                 'Reads the sensor and broadcasts data over LoRa.',
              },
              'rx': {
                  'tag':         'Snow_RX_BIN',
                  'label':       'Receiver — Full',
                  'description': 'Full receiver node with onboard dashboard. '
                                 'Receives LoRa packets and displays snow depth.',
              },
              'rx_mini': {
                  'tag':         'Snow_RX_MINI_BIN',
                  'label':       'Receiver — Lite',
                  'description': 'Minimal receiver firmware. Lower memory '
                                 'footprint, no dashboard.',
              },
          }

          # Flash offsets for ESP32 default partition table (4 MB flash)
          PARTS_TEMPLATE = [
              ('bootloader.bin', 4096),
              ('partitions.bin', 32768),
              ('boot_app0.bin',  57344),
              ('firmware.bin',   65536),
              ('littlefs.bin',   2686976),
          ]

          def check_release(tag: str) -> str | None:
              """Return tag_name if the release exists, else None."""
              url = f"https://api.github.com/repos/{SOURCE_REPO}/releases/tags/{tag}"
              headers = {
                  'Accept':     'application/vnd.github+json',
                  'User-Agent': 'snow-flasher-ci',
              }
              if GITHUB_TOKEN:
                  headers['Authorization'] = f'Bearer {GITHUB_TOKEN}'
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      data = json.loads(r.read())
                      print(f"  [{tag}] found: {data.get('tag_name')}")
                      return data.get('tag_name', tag)
              except urllib.error.HTTPError as e:
                  print(f"  [{tag}] not found (HTTP {e.code})")
                  return None
              except Exception as e:
                  print(f"  [{tag}] error: {e}")
                  return None

          os.makedirs('docs', exist_ok=True)

          releases = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'source_repo':  SOURCE_REPO,
              'variants':     {},
          }

          print(f"Checking releases in {SOURCE_REPO}...")
          for key, info in VARIANTS.items():
              version   = check_release(info['tag'])
              available = version is not None
              manifest_file = f"manifest-{key.replace('_', '-')}.json"

              releases['variants'][key] = {
                  'label':       info['label'],
                  'description': info['description'],
                  'tag':         info['tag'],
                  'version':     version or 'unreleased',
                  'available':   available,
                  'manifest':    manifest_file,
              }

              if available:
                  base = f"{BASE_URL}/{info['tag']}"
                  manifest = {
                      'name':                     f"Snow Transceiver — {info['label']}",
                      'version':                  version,
                      'home_assistant_domain':    '',
                      'new_install_prompt_erase': True,
                      'builds': [{
                          'chipFamily': 'ESP32',
                          'parts': [
                              {'path': f"{base}/{name}", 'offset': offset}
                              for name, offset in PARTS_TEMPLATE
                          ],
                      }],
                  }
                  with open(f"docs/{manifest_file}", 'w') as f:
                      json.dump(manifest, f, indent=2)
                  print(f"  → wrote docs/{manifest_file}")

          with open('docs/releases.json', 'w') as f:
              json.dump(releases, f, indent=2)
          print("\n→ wrote docs/releases.json")

          available = [k for k, v in releases['variants'].items() if v['available']]
          print(f"\nAvailable variants: {available or '(none)'}")
          PYEOF

      - name: List docs/ contents
        run: |
          echo "Final docs/ folder:"
          ls -lah docs/
          echo ""
          echo "── releases.json ──"
          cat docs/releases.json

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
