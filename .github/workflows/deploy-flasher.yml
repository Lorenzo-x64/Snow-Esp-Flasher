name: Deploy web flasher

# Fetches release info from the Snow-Depth-Sensor repo, downloads the .bin
# files locally, and serves everything from GitHub Pages (same origin → no
# CORS issues when ESP Web Tools fetches the bins).
#
# Triggers:
#   • push to main           (after edits to the flasher repo)
#   • schedule (every 6 h)   (auto-catches new releases)
#   • workflow_dispatch      (manual button in the Actions tab)

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  SOURCE_REPO: Lorenzo-x64/Snow-Depth-Sensor

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch releases, download bins, generate manifests
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 <<'PYEOF'
          import json, os, urllib.request, urllib.error
          from datetime import datetime, timezone

          SOURCE_REPO  = os.environ['SOURCE_REPO']
          GITHUB_TOKEN = os.environ.get('GITHUB_TOKEN', '')

          VARIANTS = {
              'tx': {
                  'tag':         'Snow_TX_BIN',
                  'label':       'Transmitter — Full',
                  'description': 'Full transmitter node with onboard dashboard. '
                                 'Reads the sensor and broadcasts data over LoRa.',
              },
              'rx': {
                  'tag':         'Snow_RX_BIN',
                  'label':       'Receiver — Full',
                  'description': 'Full receiver node with onboard dashboard. '
                                 'Receives LoRa packets and displays snow depth.',
              },
              'rx_mini': {
                  'tag':         'Snow_RX_MINI_BIN',
                  'label':       'Receiver — Lite',
                  'description': 'Minimal receiver firmware. Lower memory '
                                 'footprint, no dashboard.',
              },
          }

          BIN_FILES = ['bootloader.bin', 'partitions.bin', 'boot_app0.bin',
                       'firmware.bin', 'littlefs.bin']
          OFFSETS   = [4096, 32768, 57344, 65536, 2686976]

          def gh_headers():
              h = {'Accept': 'application/vnd.github+json',
                   'User-Agent': 'snow-flasher-ci'}
              if GITHUB_TOKEN:
                  h['Authorization'] = f'Bearer {GITHUB_TOKEN}'
              return h

          def get_release(tag):
              url = f"https://api.github.com/repos/{SOURCE_REPO}/releases/tags/{tag}"
              try:
                  req = urllib.request.Request(url, headers=gh_headers())
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  print(f"  [{tag}] not found (HTTP {e.code})")
                  return None
              except Exception as e:
                  print(f"  [{tag}] error: {e}")
                  return None

          def download(url, dest):
              # Need raw octet-stream + auth to download release assets via API
              req = urllib.request.Request(url, headers={
                  'Accept': 'application/octet-stream',
                  'User-Agent': 'snow-flasher-ci',
                  'Authorization': f'Bearer {GITHUB_TOKEN}',
              })
              with urllib.request.urlopen(req, timeout=60) as r, open(dest, 'wb') as f:
                  f.write(r.read())

          os.makedirs('docs/firmware', exist_ok=True)

          releases = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'source_repo':  SOURCE_REPO,
              'variants':     {},
          }

          for key, info in VARIANTS.items():
              tag = info['tag']
              print(f"\n=== {tag} ===")
              release = get_release(tag)
              available = release is not None
              version = release.get('name') or release.get('tag_name') if release else 'unreleased'
              manifest_file = f"manifest-{key.replace('_', '-')}.json"

              releases['variants'][key] = {
                  'label':       info['label'],
                  'description': info['description'],
                  'tag':         tag,
                  'version':     version,
                  'available':   available,
                  'manifest':    manifest_file,
              }

              if not available:
                  continue

              # Map asset name → API download URL (api.github.com supports CORS)
              assets = {a['name']: a['url'] for a in release.get('assets', [])}
              missing = [b for b in BIN_FILES if b not in assets]
              if missing:
                  print(f"  ⚠ missing assets: {missing} — skipping {tag}")
                  releases['variants'][key]['available'] = False
                  continue

              # Download all 5 bins into docs/firmware/<key>/
              variant_dir = f"docs/firmware/{key}"
              os.makedirs(variant_dir, exist_ok=True)
              for name in BIN_FILES:
                  dest = f"{variant_dir}/{name}"
                  print(f"  ↓ {name}", end='', flush=True)
                  download(assets[name], dest)
                  print(f"  ({os.path.getsize(dest):,} bytes)")

              # Write manifest pointing to the locally-served copies
              manifest = {
                  'name':                     f"Snow Transceiver — {info['label']}",
                  'version':                  version,
                  'home_assistant_domain':    '',
                  'new_install_prompt_erase': True,
                  'builds': [{
                      'chipFamily': 'ESP32',
                      'parts': [
                          {'path': f"firmware/{key}/{name}", 'offset': off}
                          for name, off in zip(BIN_FILES, OFFSETS)
                      ],
                  }],
              }
              with open(f"docs/{manifest_file}", 'w') as f:
                  json.dump(manifest, f, indent=2)
              print(f"  ✓ wrote docs/{manifest_file}")

          with open('docs/releases.json', 'w') as f:
              json.dump(releases, f, indent=2)
          print(f"\n✓ wrote docs/releases.json")

          available = [k for k, v in releases['variants'].items() if v['available']]
          print(f"Available variants: {available or '(none)'}")
          PYEOF

      - name: List output
        run: |
          echo "=== docs/ tree ==="
          find docs -type f | sort
          echo ""
          echo "=== docs/releases.json ==="
          cat docs/releases.json

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
